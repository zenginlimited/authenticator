<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Zengin Authenticator</title>
	<link rel="stylesheet" href="style.css">
	<script src="ux.js"></script>
	<script type="module" src="script.js" defer></script>
</head>
<body>
	<header>
		<button class="tab" id="scan" disabled>Scan</button>
		<button id="sponsor">
			<svg height="16" viewBox="0 0 16 16" width="16" fill="#c96198">
				<path d="m8 14.25.345.666a.75.75 0 0 1-.69 0l-.008-.004-.018-.01a7.152 7.152 0 0 1-.31-.17 22.055 22.055 0 0 1-3.434-2.414C2.045 10.731 0 8.35 0 5.5 0 2.836 2.086 1 4.25 1 5.797 1 7.153 1.802 8 3.02 8.847 1.802 10.203 1 11.75 1 13.914 1 16 2.836 16 5.5c0 2.85-2.045 5.231-3.885 6.818a22.066 22.066 0 0 1-3.744 2.584l-.018.01-.006.003h-.002ZM4.25 2.5c-1.336 0-2.75 1.164-2.75 3 0 2.15 1.58 4.144 3.365 5.682A20.58 20.58 0 0 0 8 13.393a20.58 20.58 0 0 0 3.135-2.211C12.92 9.644 14.5 7.65 14.5 5.5c0-1.836-1.414-3-2.75-3-1.373 0-2.609.986-3.029 2.456a.749.749 0 0 1-1.442 0C6.859 3.486 5.623 2.5 4.25 2.5Z"></path>
			</svg>
			<!-- Show sponsor text on hover — expand width -->
			<!-- <span>Sponsor</span> -->
		</button>
	</header>
	<nav>
		<label for="codes" class="tab ripple">Codes</label>
		<label for="settings" class="tab ripple">Settings</label>
	</nav>
	<div class="details" id="app-container">
		<input type="radio" name="nav" id="codes" checked hidden>
		<template>
			<div class="secret">
				<span class="app">
					<img>
					<span class="metadata">
						<a class="issuer" target="_blank"></a>
						<div class="uid"></div>
					</span>
				</span>
				<span class="code"></span>
				<span class="action-row">
					<button class="icon edit-icon"></button>
					<button class="icon copy-icon"></button>
				</span>
			</div>
		</template>
		<dialog>
			<span class="app">
				<img>
				<span class="metadata">
					<div data-name="issuer"></div>
					<div data-name="timestamp"></div>
				</span>
				<button class="icon danger hover-border"><span class="mask-icon delete-icon"></span></button>
			</span>
			<span data-name="uid"></span>
			<hr>
			<div class="code-container">
				<span class="code" data-name="code"></span>
				<span class="action-row">
					<button class="icon copy-icon"></button>
				</span>
			</div>
			<form class="action-row">
				<button value="save" disabled>Save</button>
				<button>Close</button>
			</form>
		</dialog>
	</div>
	<div class="details">
		<input type="radio" name="nav" id="settings" hidden>
		<label title="Automatically fill one-time-passcodes">
			<input type="checkbox" id="autoFill">
			<span class="name">Auto-fill OTP</span>
		</label>
		<label title="Automatically scan pages for QR codes to save for 2FA">
			<input type="checkbox" id="autoScan">
			<span class="name">Auto-scan pages</span>
		</label>
		<label class="disabled" title="Sync your settings across devices">
			<input type="checkbox" id="sync">
			<span class="name">Sync settings</span>
		</label>
	</div>
	<footer>Product of <a href="https://zengin.ca" target="_blank">Zengin</a></footer>
</body>
</html>
